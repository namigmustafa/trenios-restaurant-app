name: iOS Build & Publish (TestFlight)

on:
  push:
    branches:
      - develop
  workflow_dispatch:

env:
  PROJECT_PATH: "Trenios.Mobile/Trenios.Mobile.csproj"

jobs:
  build-and-publish-ios-test:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.100"

      - name: Pin .NET 9 SDK to 9.0.1xx band
        run: |
          echo '{"sdk":{"version":"9.0.100","rollForward":"latestPatch"}}' \
            > ${{ github.workspace }}/global.json

      - name: Install MAUI iOS workload (pinned to iOS 18.4 / Xcode 16.4)
        run: |
          cat > /tmp/workload-rollback.json << 'EOF'
          {
            "microsoft.net.sdk.ios": "18.4.9291",
            "microsoft.net.sdk.maccatalyst": "18.4.9291"
          }
          EOF
          dotnet workload install maui-ios \
            --from-rollback-file /tmp/workload-rollback.json \
            --source https://api.nuget.org/v3/index.json

      - name: Import signing certificate
        env:
          IOS_P12_BASE64: ${{ secrets.IOS_P12_BASE64 }}
          IOS_P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          security create-keychain -p "" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "" $KEYCHAIN_PATH

          echo "$IOS_P12_BASE64" | base64 --decode > $RUNNER_TEMP/cert.p12
          security import $RUNNER_TEMP/cert.p12 \
            -P "$IOS_P12_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Install provisioning profile
        env:
          IOS_PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$IOS_PROVISION_PROFILE_BASE64" | base64 --decode \
            > ~/Library/MobileDevice/Provisioning\ Profiles/distribution.mobileprovision

      - name: Build iOS IPA
        env:
          IOS_CODESIGN_KEY: ${{ secrets.IOS_CODESIGN_KEY }}
          IOS_PROVISION_PROFILE_NAME: ${{ secrets.IOS_PROVISION_PROFILE_NAME }}
        run: |
          dotnet publish $PROJECT_PATH \
            -f net9.0-ios \
            -c Release \
            -p:TargetFrameworks=net9.0-ios \
            -p:ArchiveOnBuild=true \
            -p:RuntimeIdentifier=ios-arm64 \
            -p:CodesignKey="$IOS_CODESIGN_KEY" \
            -p:CodesignProvision="$IOS_PROVISION_PROFILE_NAME" \
            -p:ApplicationVersion=${{ github.run_number }} \
            -o ./artifacts/ios

      - name: Upload to TestFlight
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$APPLE_API_KEY_BASE64" | base64 --decode \
            > ~/.appstoreconnect/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8

          IPA_PATH=$(find ./artifacts/ios -name "*.ipa" | head -1)
          xcrun altool --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$APPLE_API_KEY_ID" \
            --apiIssuer "$APPLE_API_ISSUER_ID"

      - name: Cleanup secrets
        if: always()
        run: |
          rm -f $RUNNER_TEMP/cert.p12
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db 2>/dev/null || true
