stages:
  - build
  - publish

variables:
  PROJECT_PATH: "Trenios.Mobile/Trenios.Mobile.csproj"
  ANDROID_SDK_ROOT: "/android-sdk"
  ANDROID_HOME: "/android-sdk"

# ─── TEST (ANY BRANCH EXCEPT MAIN) ────────────────────────────────────────────

build-android:
  stage: build
  image: mcr.microsoft.com/dotnet/sdk:9.0
  rules:
    - if: '$CI_COMMIT_BRANCH != "main"'
  before_script:
    - apt-get update -qq && apt-get install -y -qq openjdk-17-jdk-headless unzip wget
    - export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
    - mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
    - wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O /tmp/cmdtools.zip
    - unzip -q /tmp/cmdtools.zip -d $ANDROID_SDK_ROOT/cmdline-tools
    - mv $ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools $ANDROID_SDK_ROOT/cmdline-tools/latest
    - rm /tmp/cmdtools.zip
    - mkdir -p $ANDROID_SDK_ROOT/licenses
    - printf "24333f8a63b6825ea9c5514f83c2829b004d1fee\n8933bad161af4178b1185d1a37fbf41ea5269c55" > $ANDROID_SDK_ROOT/licenses/android-sdk-license
    - printf "84831b9409646a918e30573bab4c9c91346d8abd\n504667f4c0de7af1a06de9f4b1727b84351f2910" > $ANDROID_SDK_ROOT/licenses/android-sdk-preview-license
    - $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_SDK_ROOT "platform-tools" "platforms;android-35" "build-tools;35.0.0"
    - dotnet workload install maui-android
  script:
    - export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
    - echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > trenios.keystore
    - >
      dotnet publish $PROJECT_PATH
      -f net9.0-android
      -c Release
      -p:AndroidPackageFormat=aab
      -p:AndroidKeyStore=true
      -p:AndroidSigningKeyStore=$CI_PROJECT_DIR/trenios.keystore
      -p:AndroidSigningKeyAlias=$ANDROID_KEY_ALIAS
      -p:AndroidSigningKeyPass=$ANDROID_KEY_PASSWORD
      -p:AndroidSigningStorePass=$ANDROID_KEYSTORE_PASSWORD
      -p:TargetFrameworks=net9.0-android
      -p:ApplicationVersion=$CI_PIPELINE_IID
      -o ./artifacts/android
  artifacts:
    paths:
      - ./artifacts/android/*.aab
    expire_in: 1 hour

build-ios:
  stage: build
  image: alpine:latest
  rules:
    - if: '$CI_COMMIT_BRANCH != "main"'
  script:
    - apk add --no-cache curl
    - |
      curl -s -o /dev/null -w "%{http_code}" -X POST \
        -H "Authorization: Bearer $GITHUB_TOKEN" \
        -H "Accept: application/vnd.github.v3+json" \
        https://api.github.com/repos/$GITHUB_IOS_REPO/actions/workflows/ios-test.yml/dispatches \
        -d "{\"ref\":\"$CI_COMMIT_BRANCH\",\"inputs\":{\"pipeline_iid\":\"$CI_PIPELINE_IID\"}}"
    - echo "iOS build triggered on GitHub Actions"

publish-android-test:
  stage: publish
  image: ruby:3.2
  needs: [build-android]
  rules:
    - if: '$CI_COMMIT_BRANCH != "main"'
  before_script:
    - gem install fastlane -NV
  script:
    - >
      fastlane supply
      --aab $(ls ./artifacts/android/*.aab)
      --package_name com.trenios.merchant.app
      --track alpha
      --json_key $GOOGLE_PLAY_SERVICE_ACCOUNT_JSON
      --skip_upload_apk true
      --skip_upload_metadata true
      --skip_upload_changelogs true
      --skip_upload_images true
      --skip_upload_screenshots true

# ─── MAIN BRANCH ──────────────────────────────────────────────────────────────

build-android-prod:
  stage: build
  image: mcr.microsoft.com/dotnet/sdk:9.0
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  before_script:
    - apt-get update -qq && apt-get install -y -qq openjdk-17-jdk-headless unzip wget
    - export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
    - mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
    - wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O /tmp/cmdtools.zip
    - unzip -q /tmp/cmdtools.zip -d $ANDROID_SDK_ROOT/cmdline-tools
    - mv $ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools $ANDROID_SDK_ROOT/cmdline-tools/latest
    - rm /tmp/cmdtools.zip
    - mkdir -p $ANDROID_SDK_ROOT/licenses
    - printf "24333f8a63b6825ea9c5514f83c2829b004d1fee\n8933bad161af4178b1185d1a37fbf41ea5269c55" > $ANDROID_SDK_ROOT/licenses/android-sdk-license
    - printf "84831b9409646a918e30573bab4c9c91346d8abd\n504667f4c0de7af1a06de9f4b1727b84351f2910" > $ANDROID_SDK_ROOT/licenses/android-sdk-preview-license
    - $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_SDK_ROOT "platform-tools" "platforms;android-35" "build-tools;35.0.0"
    - dotnet workload install maui-android
  script:
    - export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
    - echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > trenios.keystore
    - >
      dotnet publish $PROJECT_PATH
      -f net9.0-android
      -c Release
      -p:AndroidPackageFormat=aab
      -p:AndroidKeyStore=true
      -p:AndroidSigningKeyStore=$CI_PROJECT_DIR/trenios.keystore
      -p:AndroidSigningKeyAlias=$ANDROID_KEY_ALIAS
      -p:AndroidSigningKeyPass=$ANDROID_KEY_PASSWORD
      -p:AndroidSigningStorePass=$ANDROID_KEYSTORE_PASSWORD
      -p:TargetFrameworks=net9.0-android
      -p:ApplicationVersion=$CI_PIPELINE_IID
      -p:DefineConstants=PROD
      -o ./artifacts/android-prod
  artifacts:
    paths:
      - ./artifacts/android-prod/*.aab
    expire_in: 1 hour

build-ios-prod:
  stage: build
  image: alpine:latest
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  script:
    - apk add --no-cache curl
    - |
      curl -s -o /dev/null -w "%{http_code}" -X POST \
        -H "Authorization: Bearer $GITHUB_TOKEN" \
        -H "Accept: application/vnd.github.v3+json" \
        https://api.github.com/repos/$GITHUB_IOS_REPO/actions/workflows/ios-prod.yml/dispatches \
        -d "{\"ref\":\"main\",\"inputs\":{\"pipeline_iid\":\"$CI_PIPELINE_IID\"}}"
    - echo "iOS production build triggered on GitHub Actions"

publish-android-prod:
  stage: publish
  image: ruby:3.2
  needs: [build-android-prod]
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  before_script:
    - gem install fastlane -NV
  script:
    - >
      fastlane supply
      --aab $(ls ./artifacts/android-prod/*.aab)
      --package_name com.trenios.merchant.app
      --track production
      --json_key $GOOGLE_PLAY_SERVICE_ACCOUNT_JSON
      --skip_upload_apk true
      --skip_upload_metadata true
      --skip_upload_changelogs true
      --skip_upload_images true
      --skip_upload_screenshots true
