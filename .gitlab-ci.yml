stages:
  - build
  - publish

variables:
  PROJECT_PATH: "Trenios.Mobile/Trenios.Mobile.csproj"
  ANDROID_SDK_ROOT: "/android-sdk"
  ANDROID_HOME: "/android-sdk"

build-android:
  stage: build
  image: mcr.microsoft.com/dotnet/sdk:9.0
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v.*/'
    - when: manual
  before_script:
    # Install Java
    - apt-get update -qq && apt-get install -y -qq openjdk-17-jdk-headless unzip wget curl
    # Install Android SDK command-line tools
    - mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
    - wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O /tmp/cmdtools.zip
    - unzip -q /tmp/cmdtools.zip -d $ANDROID_SDK_ROOT/cmdline-tools
    - mv $ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools $ANDROID_SDK_ROOT/cmdline-tools/latest
    - rm /tmp/cmdtools.zip
    - export PATH="$PATH:$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools"
    # Accept licenses and install required SDK packages
    - yes | sdkmanager --licenses > /dev/null 2>&1
    - sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0" > /dev/null 2>&1
    # Install MAUI Android workload
    - dotnet workload install maui-android
  script:
    - export PATH="$PATH:$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools"
    - echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > trenios.keystore
    - >
      dotnet publish $PROJECT_PATH
      -f net9.0-android
      -c Release
      -p:AndroidPackageFormat=aab
      -p:AndroidKeyStore=true
      -p:AndroidSigningKeyStore=$CI_PROJECT_DIR/trenios.keystore
      -p:AndroidSigningKeyAlias=$ANDROID_KEY_ALIAS
      -p:AndroidSigningKeyPass=$ANDROID_KEY_PASSWORD
      -p:AndroidSigningStorePass=$ANDROID_KEYSTORE_PASSWORD
      -p:TargetFrameworks=net9.0-android
      -o ./artifacts/android
  artifacts:
    paths:
      - ./artifacts/android/*.aab
    expire_in: 1 hour

publish-android:
  stage: publish
  image: ruby:3.2
  needs: [build-android]
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v.*/'
    - when: manual
  before_script:
    - gem install fastlane -NV
  script:
    - echo "$GOOGLE_PLAY_SERVICE_ACCOUNT_JSON" > google-play-key.json
    - >
      fastlane supply
      --aab $(ls ./artifacts/android/*.aab)
      --package_name com.companyname.trenios.mobile
      --track internal
      --json_key google-play-key.json
      --skip_upload_apk true
      --skip_upload_metadata true
      --skip_upload_changelogs true
      --skip_upload_images true
      --skip_upload_screenshots true
